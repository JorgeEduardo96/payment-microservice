name: CI - Build and Test all services

on:
  push:
    branches: [ main, shared-lib-implementation ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GITHUB_USERNAME: ${{ secrets.GH_USERNAME }}
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Show all changed files detected by paths-filter
        run: echo "${{ toJson(steps.changes.outputs) }}"

      - name: Detect changes in shared-lib
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            shared-lib:
              - 'shared-lib/**'

      - name: Publish shared-lib to GitHub Packages
        if: steps.changes.outputs.shared-lib == 'true'
        working-directory: shared-lib
        run: ./gradlew publish --no-daemon

      - name: Build all services
        run: ./gradlew clean build --no-daemon

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push Docker images
        run: |
          services=("api-gateway" "client-service" "notification-service" "order-service" "payment-service" "service-registry")
          
          for service in "${services[@]}"; do            
            image="jorgeeduardo96/payment-microservice-${service}:latest"
            docker build -t $image ./$service
            docker push $image
          done
