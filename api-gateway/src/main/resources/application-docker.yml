spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - AddRequestHeader=X-From-Gateway, true
      routes:
        - id: client-service
          uri: lb://client-service
          predicates:
            - Path=/client/**
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/order/**
        - id: notification-service-ws
          uri: lb://notification-service
          predicates:
            - Path=/ws-notifications/**

server:
  port: 8080

app:
  security:
    # The frontend/browser talks to Keycloak via localhost:8180, so tokens carry that as
    # the issuer. Inside Docker, this gateway must fetch signing keys via the internal
    # hostname instead — see SecurityConfig for how the two are reconciled.
    issuer-uri: http://localhost:8180/realms/payment-microservice
    jwk-set-uri: http://keycloak:8080/realms/payment-microservice/protocol/openid-connect/certs

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      defaultZone: http://service-registry:8761/eureka/
