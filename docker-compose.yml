services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - payment-microservice-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
      - "19092:19092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_INTERNAL://kafka:29092,PLAINTEXT_HOST://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - payment-microservice-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - payment-microservice-network

  zipkin:
    image: openzipkin/zipkin:latest
    ports:
      - "9411:9411"
    networks:
      - payment-microservice-network

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9091:9090"
    networks:
      - payment-microservice-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-storage:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - payment-microservice-network

  service-registry:
    image: jorgeeduardo96/payment-microservice-service-registry:latest
    build:
      context: ./service-registry
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - zookeeper
      - kafka
      - zipkin
      - prometheus
      - grafana
    networks:
      - payment-microservice-network

  api-gateway:
    image: jorgeeduardo96/payment-microservice-api-gateway:latest
    build:
      context: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - service-registry
    networks:
      - payment-microservice-network
    volumes:
      - ./scripts/wait-for-it.sh:/wait-for-it.sh
    command: [ "./wait-for-it.sh", "service-registry:8761", "--", "java", "-jar", "api-gateway.jar" ]

  client-service:
    image: jorgeeduardo96/payment-microservice-client-service:latest
    build:
      context: ./client-service
      args:
        GITHUB_USERNAME: ${GITHUB_USERNAME}
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - service-registry
    networks:
      - payment-microservice-network
    volumes:
      - ./scripts/wait-for-it.sh:/wait-for-it.sh
    command: [ "./wait-for-it.sh", "service-registry:8761", "--", "java", "-jar", "client-service.jar" ]

  order-service:
    image: jorgeeduardo96/payment-microservice-order-service:latest
    build:
      context: ./order-service
      args:
        GITHUB_USERNAME: ${GITHUB_USERNAME}
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - service-registry
    networks:
      - payment-microservice-network
    volumes:
      - ./scripts/wait-for-it.sh:/wait-for-it.sh
    command: [ "./wait-for-it.sh", "service-registry:8761", "--", "java", "-jar", "order-service.jar" ]

  payment-service:
    image: jorgeeduardo96/payment-microservice-payment-service:latest
    build:
      context: ./payment-service
      args:
        GITHUB_USERNAME: ${GITHUB_USERNAME}
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - service-registry
    networks:
      - payment-microservice-network
    volumes:
      - ./scripts/wait-for-it.sh:/wait-for-it.sh
    command: [ "./wait-for-it.sh", "service-registry:8761", "--", "java", "-jar", "payment-service.jar" ]

  notification-service:
    image: jorgeeduardo96/payment-microservice-notification-service:latest
    build:
      context: ./notification-service
      args:
        GITHUB_USERNAME: ${GITHUB_USERNAME}
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - service-registry
    networks:
      - payment-microservice-network
    volumes:
      - ./scripts/wait-for-it.sh:/wait-for-it.sh
    command: [ "./wait-for-it.sh", "service-registry:8761", "--", "java", "-jar", "notification-service.jar" ]

  frontend:
    image: jorgeeduardo96/payment-microservice-frontend:latest
    build:
      context: ./frontend
    ports:
      - "8000:80"
    depends_on:
      - api-gateway
    networks:
      - payment-microservice-network

volumes:
  grafana-storage:

networks:
  payment-microservice-network:
    driver: bridge
