server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS — resolves upstream hostnames per-request instead of
    # once at startup, so nginx doesn't crash-loop if api-gateway isn't up yet.
    resolver 127.0.0.11 valid=10s;

    # Matches /client, /client/... , /order, /order/... — but NOT /clients or /orders
    # (those are SPA routes and must fall through to the location below).
    location ~ ^/(client|order)($|/) {
        set $upstream http://api-gateway:8080;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws-notifications {
        set $upstream http://api-gateway:8080;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # SPA fallback for Vue Router history mode.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
