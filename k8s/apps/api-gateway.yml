apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: payment-ms
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      initContainers:
        - name: wait-for-service-registry
          image: busybox:1.35
          command: ['sh', '-c', 'until nc -z service-registry 8761; do echo "Waiting for service-registry..."; sleep 5; done']
      containers:
        - name: api-gateway
          image: jorgeeduardo96/payment-microservice-api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            # Sem isso, o Eureka registra o hostname do pod (ex: api-gateway-abc123)
            # que não resolve via DNS no Kubernetes. Com IP o roteamento funciona corretamente.
            - name: EUREKA_INSTANCE_PREFERIPADDRESS
              value: "true"
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms128m -Xmx256m"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 40
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 30
---
# NodePort para acesso externo via: http://$(minikube ip):30080
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: payment-ms
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
