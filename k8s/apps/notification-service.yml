apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: payment-ms
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      initContainers:
        - name: wait-for-service-registry
          image: busybox:1.35
          command: ['sh', '-c', 'until nc -z service-registry 8761; do echo "Waiting for service-registry..."; sleep 5; done']
        - name: wait-for-kafka
          image: busybox:1.35
          command: ['sh', '-c', 'until nc -z kafka 9092; do echo "Waiting for Kafka..."; sleep 5; done']
      containers:
        - name: notification-service
          image: jorgeeduardo96/payment-microservice-notification-service:latest
          ports:
            - containerPort: 8084
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: EUREKA_INSTANCE_PREFERIPADDRESS
              value: "true"
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms128m -Xmx256m"
            # notification-type: fake (definido no application-docker.yml), portanto
            # estas variáveis não são usadas — apenas evitam falha no startup.
            - name: SENDGRID_API_KEY
              value: "fake-key"
            - name: SENDGRID_FROM_EMAIL
              value: "noreply@example.com"
            - name: SENDGRID_FROM_NAME
              value: "Payment Service"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 40
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: payment-ms
spec:
  selector:
    app: notification-service
  ports:
    - port: 8084
      targetPort: 8084
