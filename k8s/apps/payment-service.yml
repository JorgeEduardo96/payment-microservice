apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: payment-ms
  labels:
    app: payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      initContainers:
        - name: wait-for-service-registry
          image: busybox:1.35
          command: ['sh', '-c', 'until nc -z service-registry 8761; do echo "Waiting for service-registry..."; sleep 5; done']
        - name: wait-for-kafka
          image: busybox:1.35
          command: ['sh', '-c', 'until nc -z kafka 9092; do echo "Waiting for Kafka..."; sleep 5; done']
      containers:
        - name: payment-service
          image: jorgeeduardo96/payment-microservice-payment-service:latest
          ports:
            - name: http
              containerPort: 8083
            - name: grpc
              containerPort: 9090
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: EUREKA_INSTANCE_PREFERIPADDRESS
              value: "true"
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms128m -Xmx256m"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 40
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: payment-ms
spec:
  selector:
    app: payment-service
  ports:
    - name: http
      port: 8083
      targetPort: 8083
    - name: grpc
      port: 9090
      targetPort: 9090
