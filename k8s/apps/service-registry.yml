apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-registry
  namespace: payment-ms
  labels:
    app: service-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-registry
  template:
    metadata:
      labels:
        app: service-registry
    spec:
      containers:
        - name: service-registry
          image: jorgeeduardo96/payment-microservice-service-registry:latest
          ports:
            - containerPort: 8761
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms128m -Xmx256m"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          # Dá até ~5 min para o Spring Boot terminar de subir antes de começar as verificações
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 40
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: service-registry
  namespace: payment-ms
spec:
  selector:
    app: service-registry
  ports:
    - port: 8761
      targetPort: 8761
